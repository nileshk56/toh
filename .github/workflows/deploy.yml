name: Deploy Changed Lambdas

on:
  push:
    branches: [main]

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      users: ${{ steps.filter.outputs.users }}
      tags: ${{ steps.filter.outputs.tags }}

    steps:
      - uses: actions/checkout@v3

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            users:
              - 'services/users/**'
            tags:
              - 'services/tags/**'

  deploy-users:
    needs: detect
    if: needs.detect.outputs.users == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install deps
        run: |
          cd services/users
          npm install --production

      - name: Zip
        run: |
          cd services/users
          zip -r function.zip .

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Deploy
        run: |
          aws lambda update-function-code \
            --function-name users-lambda \
            --zip-file fileb://services/users/function.zip


  deploy-tags:
    needs: detect
    if: needs.detect.outputs.tags == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - run: |
          cd services/tags
          npm install --production
          zip -r function.zip .

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - run: |
          aws lambda update-function-code \
            --function-name tags-lambda \
            --zip-file fileb://services/tags/function.zip
